apiVersion: v1
kind: ServiceAccount
metadata:
  name: log-monitor
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: log-monitor-role
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: log-monitor-binding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: log-monitor
    namespace: default
roleRef:
  kind: Role
  name: log-monitor-role
  apiGroup: rbac.authorization.k8s.io
