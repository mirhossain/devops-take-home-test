name: Grade Submission

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  dispatch-grader:
    runs-on: ubuntu-latest
    steps:
      - name: Check if challenge started
        id: challenge_check
        uses: actions/github-script@v7
        with:
          script: |
            // Check for .started_at on main first, then fall back to the PR branch.
            // The portal/start-challenge commits .started_at to main, but the PR branch
            // may have been created before that. The E2E validate workflow puts it on the
            // PR branch directly. So we check both.
            async function fileExists(ref) {
              try {
                await github.rest.repos.getContent({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  path: '.started_at',
                  ref
                });
                return true;
              } catch (e) {
                if (e.status === 404) return false;
                throw e;
              }
            }

            const onMain = await fileExists('main');
            const onPR = await fileExists(context.payload.pull_request.head.sha);
            const started = onMain || onPR;
            core.info(`.started_at on main: ${onMain}, on PR: ${onPR}`);
            core.setOutput('started', started ? 'true' : 'false');

      - name: Post comment - challenge not started
        if: steps.challenge_check.outputs.started == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: '⚠️ **Challenge not started** — please start the challenge first by going to the **Actions** tab and running the **Start Challenge** workflow.'
            });

      - name: Create pending status comment
        if: steps.challenge_check.outputs.started == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: '⏳ **Grading in progress** — your submission is being evaluated. Results will be posted here shortly.'
            });

      - name: Dispatch grading to private repo
        if: steps.challenge_check.outputs.started == 'true'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.CROSS_REPO_TOKEN }}
          repository: ${{ github.repository_owner }}/private-devops-grader
          event-type: grade-submission
          client-payload: |
            {
              "pr_repo": "${{ github.event.pull_request.head.repo.full_name }}",
              "pr_ref": "${{ github.event.pull_request.head.sha }}",
              "pr_number": "${{ github.event.pull_request.number }}",
              "candidate_repo": "${{ github.repository }}"
            }
