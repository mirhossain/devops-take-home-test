name: Grade Submission

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  dispatch-grader:
    runs-on: ubuntu-latest
    steps:
      - name: Count candidate PRs against main
        id: pr_count
        uses: actions/github-script@v7
        with:
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              base: 'main',
              state: 'all',
            });
            const count = prs.length;
            core.info(`Total PRs against main: ${count}`);
            core.setOutput('count', count);

      - name: Create pending status comment
        uses: actions/github-script@v7
        with:
          script: |
            const prCount = parseInt('${{ steps.pr_count.outputs.count }}', 10);
            const attempt = `(attempt ${prCount} of 2)`;
            let body;
            if (prCount >= 2) {
              body = `⏳ **Grading in progress** ${attempt} — your submission is being evaluated. Results will be posted here shortly.\n\n🔒 This is your final submission. Repository access will be set to read-only.`;
            } else {
              body = `⏳ **Grading in progress** ${attempt} — your submission is being evaluated. Results will be posted here shortly.\n\n💡 You will have one more attempt after this if needed.`;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });

      - name: Lock repo on second submission
        if: ${{ steps.pr_count.outputs.count >= 2 }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.CROSS_REPO_TOKEN }}
          script: |
            const repo = context.repo.repo;
            const owner = context.repo.owner;
            const prefix = 'devops-challenge-';
            if (!repo.startsWith(prefix)) {
              core.info(`Repo "${repo}" doesn't match candidate pattern, skipping lock`);
              return;
            }
            const username = repo.slice(prefix.length);
            core.info(`2nd PR detected — downgrading ${username} to read-only on ${owner}/${repo}`);
            try {
              await github.rest.repos.addCollaborator({ owner, repo, username, permission: 'pull' });
              core.info(`${username} downgraded to pull (read-only)`);
            } catch (e) {
              core.warning(`Failed to downgrade ${username}: ${e.message}`);
            }

      - name: Dispatch grading to private repo
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.CROSS_REPO_TOKEN }}
          repository: ${{ github.repository_owner }}/private-devops-grader
          event-type: grade-submission
          client-payload: |
            {
              "pr_repo": "${{ github.event.pull_request.head.repo.full_name }}",
              "pr_ref": "${{ github.event.pull_request.head.sha }}",
              "pr_number": "${{ github.event.pull_request.number }}",
              "candidate_repo": "${{ github.repository }}",
              "attempt": "${{ steps.pr_count.outputs.count }}"
            }
