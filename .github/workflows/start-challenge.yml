name: Start Challenge

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  start:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check if already started
        run: |
          if [ -f .started_at ]; then
            echo "Challenge already started at $(cat .started_at)"
            echo "To restart the timer, delete .started_at and re-run this workflow."
            exit 1
          fi

      - name: Create challenge timer
        run: |
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .started_at
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .started_at
          git commit -m "Start challenge timer"
          git push
